name: odo
description: "OdO — Personal AI daily companion for Franklin."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # Navigation
  go_router: ^17.0.0

  # Database & persistence
  drift: ^2.29.0
  drift_flutter: ^0.2.7
  sqlite3_flutter_libs: ^0.5.22
  path_provider: ^2.1.3
  path: ^1.9.0
  shared_preferences: ^2.2.3

  # Notifications & background tasks
  flutter_local_notifications: ^19.5.0
  workmanager: ^0.7.0
  timezone: ^0.10.1

  # Networking
  http: ^1.2.1

  # Connectivity
  connectivity_plus: ^7.1.1

  # Voice & biometric auth
  speech_to_text: ^7.3.0
  flutter_tts: ^4.0.2
  local_auth: ^2.2.0

  # UI & calendar
  table_calendar: ^3.2.0
  intl: ^0.20.2
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.29.0
  riverpod_generator: ^4.0.0
  build_runner: ^2.7.1
  mockito: ^5.4.0

flutter:
  uses-material-design: true